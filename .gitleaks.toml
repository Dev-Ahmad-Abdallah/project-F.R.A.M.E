title = "F.R.A.M.E. Gitleaks Config"

[extend]
useDefault = true

[[rules]]
id = "frame-jwt-secret"
description = "JWT_SECRET value detected"
regex = '''(?i)(jwt[_-]?secret|JWT_SECRET)\s*[=:]\s*["']?([a-zA-Z0-9+/=_\-]{20,})["']?'''
secretGroup = 2
tags = ["frame", "jwt", "secret"]

[[rules]]
id = "frame-federation-key"
description = "FEDERATION_SIGNING_KEY detected"
regex = '''(?i)(federation[_-]?signing[_-]?key)\s*[=:]\s*["']?([a-zA-Z0-9+/=_\-]{20,})["']?'''
secretGroup = 2
tags = ["frame", "federation", "key"]

[[rules]]
id = "frame-railway-token"
description = "Railway API token detected"
regex = '''(?i)(railway[_-]?token|RAILWAY_TOKEN)\s*[=:]\s*["']?([a-zA-Z0-9_\-]{20,})["']?'''
secretGroup = 2
tags = ["frame", "railway", "deployment"]

[[rules]]
id = "postgresql-dsn-with-password"
description = "PostgreSQL connection string with embedded password"
regex = '''postgresql://[^:]+:([^@]{6,})@'''
secretGroup = 1
tags = ["database", "postgresql"]

[[rules]]
id = "ed25519-private-key"
description = "Ed25519 / RSA private key material"
regex = '''-----BEGIN (OPENSSH|EC|RSA|PRIVATE) PRIVATE KEY-----'''
tags = ["key", "cryptography"]

[allowlist]
description = "Safe placeholders and test fixtures"
paths = [
    '''\.env\.example$''',
    '''\.env\.test$''',
    '''.*\.md$''',
]
regexes = [
    '''change-in-production''',
    '''dev-secret''',
    '''dev-signing-key''',
    '''ci-test-secret-not-for-production''',
    '''\$2b\$04\$''',
]
