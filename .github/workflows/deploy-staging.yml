name: Deploy to Staging

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to deploy"
        required: false
        default: ""

# Only one staging deploy at a time
concurrency:
  group: staging-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: "20"

jobs:
  # ══════════════════════════════════════════
  # JOB 1: BUILD — verify everything compiles
  # ══════════════════════════════════════════
  build:
    name: Build for Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ github.event.inputs.ref || github.head_ref || github.ref }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Cache node_modules
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install workspace dependencies
        run: npm ci

      - name: Build all workspaces
        run: npm run build
        env:
          CI: false
          DISABLE_ESLINT_PLUGIN: true

      - name: Docker build validation (homeserver)
        run: |
          docker build \
            --file services/homeserver/Dockerfile \
            --tag frame-homeserver:staging-${{ github.sha }} \
            .

      - name: Docker build validation (frontend)
        run: |
          docker build \
            --file services/frontend/Dockerfile \
            --tag frame-frontend:staging-${{ github.sha }} \
            .

  # ══════════════════════════════════════════
  # JOB 2: DEPLOY — push to Railway staging
  # ══════════════════════════════════════════
  deploy-staging:
    name: Deploy to Railway (Staging)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    environment: staging

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ github.event.inputs.ref || github.head_ref || github.ref }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy homeserver to staging
        run: railway up --service frame-homeserver-staging --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}

      - name: Deploy frontend to staging
        run: railway up --service frame-frontend-staging --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}

      - name: Wait for deploy propagation
        run: sleep 30

      - name: Health check — staging homeserver
        run: |
          STAGING_URL="${{ vars.STAGING_HOMESERVER_URL || 'https://frame-staging.up.railway.app' }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${STAGING_URL}/health" --max-time 15)
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Staging homeserver returned HTTP $STATUS"
          else
            echo "Staging homeserver healthy (HTTP $STATUS)"
          fi

      - name: Comment PR with staging URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const body = `## Staging Deployment

            | Service | URL |
            |---------|-----|
            | Homeserver | \`${{ vars.STAGING_HOMESERVER_URL || 'https://frame-staging.up.railway.app' }}\` |
            | Frontend | \`${{ vars.STAGING_FRONTEND_URL || 'https://frame-frontend-staging.up.railway.app' }}\` |

            **Commit:** \`${{ github.sha }}\`
            **Deployed at:** ${new Date().toISOString()}`;

            // Find existing staging comment and update, or create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('## Staging Deployment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Deployment summary
        run: |
          echo "## Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
