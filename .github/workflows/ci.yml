name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Minimal permissions — nothing writes unless explicitly granted
permissions:
  contents: read
  pull-requests: write
  security-events: write
  checks: write

# Queue runs on the same branch — don't cancel in-progress (tests take 10+ min)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  # ══════════════════════════════════════════
  # JOB 1: BUILD — type-check + compile
  # ══════════════════════════════════════════
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Pinned by SHA — never by tag — to prevent supply chain attacks
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # Cache node_modules across runs (keyed on lockfile hash)
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      # npm ci — uses lockfile for deterministic installs (NOT npm install)
      - name: Install workspace dependencies
        run: npm ci

      # Quick grep-based secret scan — catches common leaks before they reach remote
      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for common secret patterns in tracked files..."
          PATTERNS='PRIVATE.KEY|aws_secret_access_key|sk_live_|-----BEGIN .* PRIVATE KEY'
          # Search only tracked source files, exclude lockfiles/vendored code
          MATCHES=$(git grep -InE "$PATTERNS" -- \
            ':!package-lock.json' \
            ':!node_modules' \
            ':!*.png' ':!*.jpg' ':!*.ico' \
            ':!*.env.example' \
            ':!docs/' \
            ':!*.md' || true)
          if [ -n "$MATCHES" ]; then
            echo "::warning::Potential secrets detected in source files:"
            echo "$MATCHES"
            echo ""
            echo "Review the matches above. False positives from .env.example and docs are excluded."
            # Non-blocking — gitleaks in security job is the hard gate
          else
            echo "No secret patterns detected."
          fi

      - name: Build shared types
        run: npm run build:shared

      - name: TypeScript check (homeserver)
        run: cd services/homeserver && npx tsc --noEmit

      - name: TypeScript check (frontend)
        run: cd services/frontend && npx tsc --noEmit

      - name: Build homeserver
        run: npm run build:homeserver

      - name: Build frontend
        run: npm run build:frontend
        env:
          CI: false
          # Skip CRA's built-in ESLint — we lint separately with full plugin set
          DISABLE_ESLINT_PLUGIN: true

      - name: Docker build smoke test (homeserver)
        run: |
          docker build \
            --file services/homeserver/Dockerfile \
            --tag frame-homeserver:ci-${{ github.sha }} \
            .

      - name: Docker build smoke test (frontend)
        run: |
          docker build \
            --file services/frontend/Dockerfile \
            --tag frame-frontend:ci-${{ github.sha }} \
            .

  # ══════════════════════════════════════════
  # JOB 2: TEST — unit + integration
  # ══════════════════════════════════════════
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: frame_test
          POSTGRES_USER: frame_test
          POSTGRES_PASSWORD: frame_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://frame_test:frame_test_password@localhost:5432/frame_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-not-for-production-use-only-64chars-minimum-length
      HOMESERVER_DOMAIN: localhost:3000
      FEDERATION_SIGNING_KEY: ci-test-signing-key-not-real
      BCRYPT_SALT_ROUNDS: "10"
      PORT: "3001"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install workspace dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build:shared

      - name: Run DB migrations
        working-directory: services/homeserver
        run: npm run migrate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: ESLint (homeserver)
        # Known warnings: _next (errorHandler), _signatures (federation), _msg (messageService), _err (errorHandler)
        run: cd services/homeserver && npx eslint src --ext .ts --max-warnings 5

      - name: ESLint (frontend)
        # Known warnings: scaffolded UI state vars (shortcuts, mobile menu, skeleton) awaiting wiring
        run: cd services/frontend && npx eslint src --ext .ts,.tsx --max-warnings 25

      - name: Tests (homeserver)
        run: npm run test:homeserver -- --coverage --passWithNoTests
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}

      - name: Tests (frontend)
        run: npm run test:frontend -- --coverage --passWithNoTests
        env:
          CI: true

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ github.sha }}
          path: |
            services/homeserver/coverage/
            services/frontend/coverage/
          retention-days: 14

  # ══════════════════════════════════════════
  # JOB 3: SECURITY — all gates
  # ══════════════════════════════════════════
  security:
    name: Security Scans
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install workspace dependencies
        run: npm ci

      # GATE 1: Dependency audit — report high/critical but don't block
      # (transitive dep vulnerabilities often require major version bumps)
      - name: npm audit (homeserver)
        working-directory: services/homeserver
        run: npm audit --audit-level=high || true

      - name: npm audit (frontend)
        working-directory: services/frontend
        run: npm audit --audit-level=high || true

      # GATE 1b: Block on critical vulnerabilities (non-negotiable)
      - name: npm audit — block on critical (root)
        run: npm audit --audit-level=critical

      # GATE 2: Secret scan — full git history
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      # GATE 3: CodeQL SAST (requires GitHub Advanced Security — free for public repos)
      - name: Initialize CodeQL
        if: github.repository_visibility == 'public'
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          config-file: .codeql/codeql-config.yml
          queries: security-extended

      - name: Autobuild for CodeQL
        if: github.repository_visibility == 'public'
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        if: github.repository_visibility == 'public'
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
          upload: true

      # GATE 4: Container image vulnerability scan (best-effort)
      - name: Build homeserver image for scanning
        run: docker build --file services/homeserver/Dockerfile --tag frame-homeserver:scan .
        continue-on-error: true

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        with:
          image-ref: "frame-homeserver:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy results to GHAS
        if: github.repository_visibility == 'public' && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"
          category: "container-scan"

  # ══════════════════════════════════════════
  # JOB 4: DEPLOY — main only, all gates pass
  # Railway "Wait for CI" auto-deploys when this workflow succeeds.
  # This job is a fallback for CLI-based deploys if auto-deploy is off.
  # ══════════════════════════════════════════
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build, test]  # Deploy requires build + test only; security scans are advisory
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy homeserver
        run: railway up --service "project-F.R.A.M.E" --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy frontend
        run: railway up --service frontend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Health check — homeserver
        run: |
          echo "Waiting 30s for deploy to propagate..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://project-frame-production.up.railway.app/health --max-time 15)
          if [ "$STATUS" != "200" ]; then
            echo "FAILED — homeserver returned HTTP $STATUS"
            exit 1
          fi
          echo "homeserver healthy (HTTP $STATUS)"

      - name: Health check — frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://frame.up.railway.app --max-time 15)
          if [ "$STATUS" != "200" ]; then
            echo "FAILED — frontend returned HTTP $STATUS"
            exit 1
          fi
          echo "frontend healthy (HTTP $STATUS)"

      - name: Deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
