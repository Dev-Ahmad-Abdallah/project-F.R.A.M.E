name: Security — Deep Scan

on:
  schedule:
    - cron: "0 2 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql-deep:
    name: CodeQL — Extended Queries
    # CodeQL requires GitHub Advanced Security (free for public repos only)
    # Use continue-on-error so private repos don't fail the workflow
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b1bff81932f5cdfc8695c7752dcee935dcd061c8  # v4.33.0
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality
          config-file: .codeql/codeql-config.yml

      - name: Setup Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: "20"

      - name: Install and build
        run: |
          npm ci
          npm run build:shared
          npm run build:homeserver
          npm run build:frontend

      - name: Analyze
        uses: github/codeql-action/analyze@b1bff81932f5cdfc8695c7752dcee935dcd061c8  # v4.33.0
        with:
          category: "/language:javascript-typescript"
          upload: true

  semgrep:
    name: Semgrep — Crypto & Injection Rules
    # Requires SEMGREP_APP_TOKEN secret — skip if not configured
    if: ${{ secrets.SEMGREP_APP_TOKEN != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Semgrep scan
        run: |
          semgrep \
            --config p/javascript \
            --config p/typescript \
            --config p/nodejs \
            --config p/jwt \
            --config p/express \
            --config p/secrets \
            --sarif \
            --output semgrep-results.sarif \
            --error \
            services/
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep results
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8  # v4.33.0
        if: always() && github.repository_visibility == 'public'
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  container-scan:
    name: Container Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        service: [homeserver, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build image
        run: |
          docker build \
            --file services/${{ matrix.service }}/Dockerfile \
            --tag frame-${{ matrix.service }}:scan \
            .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: "frame-${{ matrix.service }}:scan"
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8  # v4.33.0
        if: always() && github.repository_visibility == 'public'
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
          category: "trivy-${{ matrix.service }}"

  secrets-deep:
    name: Full History Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout — full history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Gitleaks full history scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: "20"

      - name: Install homeserver deps (production only)
        working-directory: services/homeserver
        run: npm ci --omit=dev

      - name: Check licenses — block GPL/AGPL
        working-directory: services/homeserver
        run: |
          npx license-checker \
            --production \
            --excludePrivatePackages \
            --failOn "GPL;AGPL;LGPL;CC-BY-NC" \
            --json \
            --out license-report.json
          echo "License check passed"

      - name: Upload license report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: license-report
          path: services/homeserver/license-report.json
          retention-days: 30
