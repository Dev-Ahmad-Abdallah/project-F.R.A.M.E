networks:
  frame-network:
    driver: bridge

volumes:
  pg_a_data:
  pg_b_data:
  redis_a_data:
  redis_b_data:

services:

  # ── Homeserver A ──────────────────────────────────────────────
  homeserver-a:
    build:
      context: .
      dockerfile: services/homeserver/Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres-a:5432/frame_a
      REDIS_URL: redis://redis-a:6379
      PORT: 3000
      NODE_ENV: development
      # DEV ONLY — change before any real deployment
      JWT_SECRET: dev-secret-homeserver-a-change-in-production-xxxxxxxxxxxxxxxxx
      BCRYPT_SALT_ROUNDS: 10     # Min 10 enforced by config schema; production uses 12
      HOMESERVER_DOMAIN: localhost:3000
      FEDERATION_SIGNING_KEY: dev-signing-key-a
      FEDERATION_PEERS: localhost:3001
      CORS_ORIGINS: http://localhost:5173,http://localhost:3002
    depends_on:
      postgres-a:
        condition: service_healthy
      redis-a:
        condition: service_healthy
    networks:
      - frame-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ── Homeserver B (federation peer) ───────────────────────────
  homeserver-b:
    build:
      context: .
      dockerfile: services/homeserver/Dockerfile
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres-b:5432/frame_b
      REDIS_URL: redis://redis-b:6379
      PORT: 3000
      NODE_ENV: development
      JWT_SECRET: dev-secret-homeserver-b-change-in-production-xxxxxxxxxxxxxxxxx
      BCRYPT_SALT_ROUNDS: 10
      HOMESERVER_DOMAIN: localhost:3001
      FEDERATION_SIGNING_KEY: dev-signing-key-b
      FEDERATION_PEERS: localhost:3000
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      postgres-b:
        condition: service_healthy
      redis-b:
        condition: service_healthy
    networks:
      - frame-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
      args:
        REACT_APP_HOMESERVER_URL: http://localhost:3000
    environment:
      PORT: 80
    ports:
      - "127.0.0.1:3002:80"
    depends_on:
      - homeserver-a
    networks:
      - frame-network
    restart: unless-stopped

  # ── PostgreSQL A ──────────────────────────────────────────────
  postgres-a:
    image: postgres:16.8-alpine3.21
    environment:
      POSTGRES_DB: frame_a
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_a_data:/var/lib/postgresql/data
    networks:
      - frame-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d frame_a"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── PostgreSQL B ──────────────────────────────────────────────
  postgres-b:
    image: postgres:16.8-alpine3.21
    environment:
      POSTGRES_DB: frame_b
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pg_b_data:/var/lib/postgresql/data
    networks:
      - frame-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d frame_b"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis A ───────────────────────────────────────────────────
  redis-a:
    image: redis:7.4-alpine3.21
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_a_data:/data
    networks:
      - frame-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # LRU eviction + no persistence in dev (faster)
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --save ""

  # ── Redis B ───────────────────────────────────────────────────
  redis-b:
    image: redis:7.4-alpine3.21
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_b_data:/data
    networks:
      - frame-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --save ""
