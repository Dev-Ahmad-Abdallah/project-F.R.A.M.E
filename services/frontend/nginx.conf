server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 64k;

    # Hide nginx version from response headers
    server_tokens off;

    # ── Security Headers (applied to ALL responses) ──────────

    # Content Security Policy
    # - wasm-unsafe-eval required for @matrix-org/matrix-sdk-crypto-wasm
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://project-frame-production.up.railway.app https://*.up.railway.app; media-src blob:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

    # Force HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disable legacy XSS filter (CSP is the modern defense)
    add_header X-XSS-Protection "0" always;

    # Disable unneeded browser features
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(), payment=(), usb=()" always;

    # ── React Router SPA fallback ─────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressively cache static assets (hashed filenames)
    location ~* \.(js|css|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        # Repeat security headers (nginx doesn't inherit add_header from parent)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # Cache images moderately
    location ~* \.(png|jpg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Block access to hidden files (.env, .git, etc.) ───────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Block source maps in production ───────────────────────
    location ~* \.map$ {
        deny all;
        return 404;
    }

    # ── Sanitised error pages ─────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
