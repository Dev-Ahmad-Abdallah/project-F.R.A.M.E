server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version from response headers
    server_tokens off;

    # ── Security Headers ──────────────────────────────────────

    # Content Security Policy
    # - script-src 'self': no inline scripts, no external CDN scripts
    # - connect-src: API calls to our homeservers only
    # - frame-ancestors 'none': cannot be embedded in iframes (clickjacking)
    # - wasm-unsafe-eval required for @matrix-org/matrix-sdk-crypto-wasm
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'wasm-unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob:;
        font-src 'self';
        connect-src 'self' https://project-frame-production.up.railway.app https://*.up.railway.app;
        media-src 'none';
        object-src 'none';
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
        upgrade-insecure-requests;
    " always;

    # Force HTTPS for 1 year, include subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent clickjacking — belt-and-suspenders with CSP frame-ancestors
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Control referrer information sent to third parties
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disable unneeded browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    # ── React Router SPA fallback ─────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Aggressively cache static assets (hashed filenames)
        location ~* \.(js|css|png|jpg|gif|ico|woff2|woff|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Never cache index.html — app shell must always be fresh
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }
    }

    # ── Block access to hidden files (.env, .git, etc.) ───────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Block source maps in production ───────────────────────
    # Source maps expose original TypeScript source to attackers
    location ~* \.map$ {
        deny all;
        return 404;
    }

    # ── Sanitised error pages ─────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
