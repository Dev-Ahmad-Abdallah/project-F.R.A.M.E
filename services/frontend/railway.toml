[build]
builder = "DOCKERFILE"
dockerfilePath = "services/frontend/Dockerfile"
watchPatterns = ["services/frontend/**", "shared/**"]

[deploy]
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# nginx listens on port 80 (Railway auto-detects via EXPOSE)
# No PORT env var needed — Railway maps external HTTPS to internal 80
