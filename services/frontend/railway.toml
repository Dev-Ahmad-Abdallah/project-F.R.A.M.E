[build]
builder = "DOCKERFILE"
dockerfilePath = "services/frontend/Dockerfile"
watchPatterns = ["services/frontend/**", "shared/**"]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# nginx listens on $PORT (Railway injects PORT env var)
# envsubst templates PORT into nginx.conf at container start
